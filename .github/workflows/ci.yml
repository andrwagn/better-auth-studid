name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v1
      - run: bun install
      - run: bun run lint:types
      - run: bun run build
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
